<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Report Pastificio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1208;--paper:#f8f4ed;--warm:#fdfaf5;--gold:#c9921a;--gold-light:#f0d690;--rust:#b5451b;--olive:#5a7a3a;--muted:#8a7e6e;--card:#ffffff;--border:rgba(201,146,26,0.15);--shadow:0 4px 20px rgba(26,18,8,0.10);--radius:14px;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}

  /* LOGIN */
  #login{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
  .login-box{background:var(--warm);border-radius:24px;padding:44px 36px;max-width:380px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.4);animation:fadeUp .5s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .login-logo{font-size:52px;margin-bottom:14px;}
  .login-box h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:6px;}
  .login-box p{font-size:13px;color:var(--muted);margin-bottom:28px;font-weight:500;}
  .pin-field{width:100%;padding:14px;font-size:26px;letter-spacing:10px;text-align:center;border:2px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;background:var(--paper);color:var(--ink);outline:none;transition:border-color .2s;margin-bottom:14px;}
  .pin-field:focus{border-color:var(--gold);}
  .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold) 0%,#a07010 100%);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
  .pin-err{color:var(--rust);font-size:13px;font-weight:600;margin-top:10px;min-height:18px;}

  /* HEADER — completamente responsive */
  header{background:var(--warm);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);flex-wrap:wrap;}
  .hbrand{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
  .hlogo{width:40px;height:40px;min-width:40px;background:linear-gradient(135deg,var(--gold) 0%,#a07010 100%);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 10px rgba(201,146,26,0.3);}
  .hbrand-text h1{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hbrand-text p{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.8px;text-transform:uppercase;}
  .hright{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .live-pill{display:flex;align-items:center;gap:5px;background:rgba(90,122,58,0.1);color:var(--olive);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid rgba(90,122,58,0.25);white-space:nowrap;}
  .live-dot{width:6px;height:6px;min-width:6px;background:var(--olive);border-radius:50%;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
  .btn-sm{padding:7px 12px;border:1.5px solid var(--border);background:transparent;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-sm:hover{border-color:var(--rust);color:var(--rust);}
  .btn-print{background:var(--gold)!important;color:#fff!important;border-color:var(--gold)!important;}

  /* TABS */
  .tabs-bar{background:var(--warm);padding:0 12px;display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs-bar::-webkit-scrollbar{display:none;}
  .tab{padding:11px 14px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-1px;flex-shrink:0;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;}

  /* MAIN */
  .main{max-width:1200px;margin:0 auto;padding:20px 12px;}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
  @media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
  .kpi{background:var(--card);border-radius:var(--radius);padding:18px 16px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden;}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));}
  .kpi.green::before{background:linear-gradient(90deg,var(--olive),#8ab05a);}
  .kpi.rust::before{background:linear-gradient(90deg,var(--rust),#e07050);}
  .kpi-label{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .kpi-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--ink);line-height:1;}
  .kpi-val.money{color:var(--olive);}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;font-weight:500;}

  /* CARD */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;}
  .card-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .card-hdr h3{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}

  /* MONTHS GRID */
  .months-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}
  @media(min-width:500px){.months-grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:900px){.months-grid{grid-template-columns:1fr 1fr 1fr;}}
  .month-card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:all .2s;}
  .month-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,18,8,0.15);border-color:var(--gold);}
  .month-card.empty-month{opacity:0.45;}
  .month-card h4{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:12px;}
  .mc-line{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(201,146,26,0.08);font-size:12px;}
  .mc-total{margin-top:12px;text-align:right;}
  .mc-total .val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--olive);}
  .mc-total .sub{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

  /* TABLES */
  .stbl{width:100%;border-collapse:collapse;font-size:13px;}
  .stbl thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);}
  .stbl tbody tr{border-bottom:1px solid rgba(201,146,26,0.08);}
  .stbl tbody tr:hover{background:#fdf8f0;}
  .stbl td{padding:11px 14px;vertical-align:middle;}
  .stbl tfoot td{padding:12px 14px;font-weight:700;background:#fdf8f0;}
  .stbl .grand-row td{background:var(--ink);color:var(--gold-light);font-size:15px;font-weight:700;font-family:'Playfair Display',serif;}
  .grand-num{font-size:18px;font-weight:900;color:#7ce89a;}
  .money-cell{font-family:'Playfair Display',serif;font-weight:700;color:var(--olive);}

  /* DETAIL RECORDS - cards on mobile */
  .detail-record{background:#fdf8f0;border:1px solid rgba(201,146,26,0.12);border-radius:10px;padding:12px;margin:8px 12px;}
  .detail-record-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .detail-desc{font-size:13px;font-weight:700;flex:1;line-height:1.3;}
  .detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;}
  .dm-item{display:flex;flex-direction:column;}
  .dm-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);}
  .dm-value{font-size:13px;font-weight:700;}
  .dm-price{color:var(--muted);font-size:12px;}
  .dm-amount{color:var(--olive);font-family:'Playfair Display',serif;}
  .detail-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(201,146,26,0.1);}

  /* DESKTOP TABLE */
  .dtbl{width:100%;border-collapse:collapse;font-size:12px;}
  .dtbl thead th{background:var(--ink);color:rgba(248,244,237,0.65);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;white-space:nowrap;}
  .dtbl tbody tr{border-bottom:1px solid rgba(201,146,26,0.08);}
  .dtbl tbody tr:hover{background:#fdf8f0;}
  .dtbl td{padding:9px 12px;vertical-align:middle;}

  .chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;}
  .chip-pasta{background:#fef3e2;color:#a06400;}.chip-spezie{background:#fce8e8;color:#c0392b;}.chip-etichettatura{background:#e8f5e9;color:#2e7d32;}.chip-riso{background:#e3f2fd;color:#1565c0;}.chip-riso_prezzo{background:#ede7f6;color:#4527a0;}.chip-altro{background:#f3e5f5;color:#6a1b9a;}
  .worker-tag{display:inline-flex;align-items:center;gap:3px;background:#f0f4ff;color:#3b5bdb;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}

  .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 14px;background:#fdf8f0;border-bottom:1px solid var(--border);}
  .filter-row select,.filter-row input{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--ink);outline:none;font-weight:500;}
  .filter-row input{flex:1;min-width:120px;}

  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .empty{padding:44px 20px;text-align:center;}
  .empty .ei{font-size:44px;opacity:.3;margin-bottom:10px;}
  .empty p{font-family:'Playfair Display',serif;font-size:15px;color:var(--muted);font-style:italic;}
  .loading{padding:40px;text-align:center;color:var(--muted);font-size:14px;font-weight:600;}

  /* PRINT */
  @media print {
    #login,header,.tabs-bar,.filter-row,.btn-print,.btn-sm,.live-pill,.no-print{display:none!important;}
    body{background:#fff!important;}
    .main{padding:0!important;max-width:100%!important;}
    .card{box-shadow:none!important;border:1px solid #ccc!important;margin-bottom:12px!important;break-inside:avoid;}
    .kpi{box-shadow:none!important;border:1px solid #ccc!important;}
    .kpi-val.money,.money-cell,.grand-num,.dm-amount{color:#2d6a2d!important;}
    .dtbl thead th,.stbl .grand-row td{background:#2d1a0e!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .print-header{display:block!important;}
    .kpi-grid{grid-template-columns:repeat(4,1fr)!important;}
    .months-grid{grid-template-columns:1fr 1fr!important;}
    .detail-record{border:1px solid #ddd!important;break-inside:avoid;}
    @page{margin:1.5cm;size:A4;}
  }
  .print-header{display:none;text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #ccc;}
  .print-header h1{font-family:'Playfair Display',serif;font-size:22px;}
  .print-header p{font-size:12px;color:#666;margin-top:4px;}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-logo">📊</div>
    <h1>Report Pastificio</h1>
    <p>Accesso riservato al datore di lavoro</p>
    <input type="password" class="pin-field" id="pin-input" maxlength="4" placeholder="••••" oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">🔓 Accedi</button>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="hbrand">
      <div class="hlogo">📊</div>
      <div class="hbrand-text">
        <h1>Report Pastificio</h1>
        <p>Pannello amministrazione</p>
      </div>
    </div>
    <div class="hright">
      <div class="live-pill no-print"><div class="live-dot"></div>Live</div>
      <button class="btn-sm btn-print no-print" onclick="window.print()">🖨️ PDF</button>
      <button class="btn-sm no-print" onclick="doLogout()">← Esci</button>
    </div>
  </header>

  <div class="tabs-bar no-print" id="tabs-bar"></div>
  <div class="main" id="main"><div class="loading">⏳ Connessione al database…</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOFqkem40QWV_0uWmj7ivQMVJ55zDtwhs",
  authDomain: "pastificio-e004f.firebaseapp.com",
  databaseURL: "https://pastificio-e004f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pastificio-e004f",
  storageBucket: "pastificio-e004f.firebasestorage.app",
  messagingSenderId: "439505555806",
  appId: "1:439505555806:web:7780ecf3f7fc77ca34ffcf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const PIN = "1234";
const PRICES = {pasta:0.5,spezie:0.35,etichettatura:0.045,riso:0.068,riso_prezzo:0.095};

function generateMonths(){
  const m=["NOVEMBRE 2025"],n=["GENNAIO","FEBBRAIO","MARZO","APRILE","MAGGIO","GIUGNO","LUGLIO","AGOSTO","SETTEMBRE","OTTOBRE","NOVEMBRE","DICEMBRE"];
  n.forEach(x=>m.push(x+" 2026"));
  const y=new Date().getFullYear();
  if(y>2026)for(let yr=2027;yr<=y+1;yr++)n.forEach(x=>m.push(x+" "+yr));
  return m;
}
function getCurrentMonth(){
  const n=new Date();
  return["GENNAIO","FEBBRAIO","MARZO","APRILE","MAGGIO","GIUGNO","LUGLIO","AGOSTO","SETTEMBRE","OTTOBRE","NOVEMBRE","DICEMBRE"][n.getMonth()]+" "+n.getFullYear();
}

const MONTHS=generateMonths();
let currentMonth='ALL',allData={},customTypes=[];

window.tryLogin=function(){
  if(document.getElementById('pin-input').value===PIN){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    startApp();
  }else{
    document.getElementById('pin-err').textContent='✕ PIN errato.';
    document.getElementById('pin-input').value='';
  }
};

window.doLogout=function(){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pin-input').value='';
  document.getElementById('pin-err').textContent='';
};

function startApp(){
  onValue(ref(db,'customTypes'),snap=>{customTypes=snap.exists()?(snap.val()||[]):[];});
  MONTHS.forEach(month=>{
    onValue(ref(db,'lavori/'+month.replace(/ /g,'_')),snap=>{
      allData[month]=[];
      if(snap.exists())snap.forEach(c=>allData[month].push({fbKey:c.key,...c.val()}));
      allData[month].sort((a,b)=>a.ts-b.ts);
      renderTabs();renderContent();
    });
  });
}

function renderTabs(){
  document.getElementById('tabs-bar').innerHTML=
    `<div class="tab ${currentMonth==='ALL'?'active':''}" onclick="sw('ALL')">📊 Riepilogo</div>`+
    MONTHS.map(m=>`<div class="tab ${currentMonth===m?'active':''}" onclick="sw('${m}')">${m}</div>`).join('');
}

window.sw=function(m){
  currentMonth=m;renderTabs();renderContent();
  setTimeout(()=>{const a=document.querySelector('.tab.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},100);
};

function renderContent(){
  const now=new Date().toLocaleDateString('it-IT');
  const subtitle=currentMonth==='ALL'?'Riepilogo generale':currentMonth;
  document.getElementById('main').innerHTML=
    `<div class="print-header"><h1>Report Pastificio</h1><p>${subtitle} – ${now}</p></div>`+
    (currentMonth==='ALL'?renderSummary():renderMonth(currentMonth));
}

function renderSummary(){
  const curM=getCurrentMonth();
  const visible=MONTHS.filter(m=>{
    if((allData[m]||[]).length>0)return true;
    return MONTHS.indexOf(m)<=MONTHS.indexOf(curM);
  });
  let tP=0,tI=0,tV=0,tIva=0;
  const mcs=visible.map(m=>{const rows=allData[m]||[],s=calcSummary(rows);tP+=sumPz(rows);tI+=s.imponibile;tIva+=s.iva;tV+=rows.length;return{m,rows,s,pezzi:sumPz(rows)};});
  return `
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Voci totali</div><div class="kpi-val">${tV}</div></div>
    <div class="kpi"><div class="kpi-label">Pezzi lavorati</div><div class="kpi-val">${tP.toLocaleString('it')}</div></div>
    <div class="kpi green"><div class="kpi-label">Imponibile</div><div class="kpi-val money">€ ${tI.toFixed(2)}</div><div class="kpi-sub">+IVA € ${tIva.toFixed(2)}</div></div>
    <div class="kpi rust"><div class="kpi-label">Totale c/IVA</div><div class="kpi-val money">€ ${(tI+tIva).toFixed(2)}</div></div>
  </div>
  <div class="months-grid">
    ${mcs.map(mc=>`<div class="month-card ${!mc.rows.length?'empty-month':''}" onclick="sw('${mc.m}')">
      <h4>${mc.m}</h4>
      ${!mc.rows.length?'<p style="font-size:12px;color:var(--muted);font-style:italic;">Nessun lavoro inserito</p>':mc.s.lines.map(l=>`<div class="mc-line"><span><span class="chip chip-${chipCls(l.tipo)}">${tLbl(l.tipo)}</span> ${l.pezzi.toLocaleString('it')} pz</span><strong>€ ${l.importo.toFixed(2)}</strong></div>`).join('')}
      <div class="mc-total"><div class="val">€ ${(mc.s.imponibile+mc.s.iva).toFixed(2)}</div><div class="sub">totale c/iva</div></div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-hdr"><h3>Riepilogo per mese</h3></div>
    <div class="tbl-wrap"><table class="stbl">
      <thead><tr><th>Mese</th><th>Voci</th><th>Pezzi</th><th>Imponibile</th><th>IVA 22%</th><th>Totale</th></tr></thead>
      <tbody>${mcs.map(mc=>`<tr><td><strong>${mc.m}</strong></td><td>${mc.rows.length}</td><td>${mc.pezzi.toLocaleString('it')}</td><td>€ ${mc.s.imponibile.toFixed(2)}</td><td>€ ${mc.s.iva.toFixed(2)}</td><td class="money-cell">€ ${(mc.s.imponibile+mc.s.iva).toFixed(2)}</td></tr>`).join('')}</tbody>
      <tfoot>
        <tr><td colspan="3"><strong>TOTALI</strong></td><td>€ ${tI.toFixed(2)}</td><td>€ ${tIva.toFixed(2)}</td><td class="money-cell">€ ${(tI+tIva).toFixed(2)}</td></tr>
        <tr class="grand-row"><td colspan="5">TOTALE GENERALE c/IVA</td><td class="grand-num">€ ${(tI+tIva).toFixed(2)}</td></tr>
      </tfoot>
    </table></div>
  </div>`;
}

function renderMonth(month){
  const rows=allData[month]||[],s=calcSummary(rows);
  const workers=[...new Set(rows.filter(r=>r.lavoratore).map(r=>r.lavoratore))];
  return `
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Voci</div><div class="kpi-val">${rows.length}</div></div>
    <div class="kpi"><div class="kpi-label">Pezzi</div><div class="kpi-val">${sumPz(rows).toLocaleString('it')}</div></div>
    <div class="kpi green"><div class="kpi-label">Imponibile</div><div class="kpi-val money">€ ${s.imponibile.toFixed(2)}</div><div class="kpi-sub">+IVA € ${s.iva.toFixed(2)}</div></div>
    <div class="kpi rust"><div class="kpi-label">Totale c/IVA</div><div class="kpi-val money">€ ${(s.imponibile+s.iva).toFixed(2)}</div></div>
  </div>
  <div class="card">
    <div class="card-hdr"><h3>Riepilogo per tipo – ${month}</h3></div>
    <div class="tbl-wrap"><table class="stbl">
      <thead><tr><th>Tipo</th><th>Pezzi</th><th>€/cad.</th><th>Importo</th></tr></thead>
      <tbody>${s.lines.map(l=>`<tr><td><span class="chip chip-${chipCls(l.tipo)}">${tLbl(l.tipo)}</span></td><td>${l.pezzi.toLocaleString('it')}</td><td>€ ${l.prezzo.toFixed(3)}</td><td class="money-cell">€ ${l.importo.toFixed(2)}</td></tr>`).join('')}</tbody>
      <tfoot>
        <tr><td colspan="3"><strong>Imponibile</strong></td><td class="money-cell">€ ${s.imponibile.toFixed(2)}</td></tr>
        <tr><td colspan="3">IVA 22%</td><td class="money-cell">€ ${s.iva.toFixed(2)}</td></tr>
        <tr class="grand-row"><td colspan="3">TOTALE</td><td class="grand-num">€ ${(s.imponibile+s.iva).toFixed(2)}</td></tr>
      </tfoot>
    </table></div>
  </div>
  ${workers.length?`<div class="card">
    <div class="card-hdr"><h3>Per lavoratore – ${month}</h3></div>
    <div class="tbl-wrap"><table class="stbl">
      <thead><tr><th>Lavoratore</th><th>Voci</th><th>Pezzi</th><th>Imponibile</th><th>Totale c/IVA</th></tr></thead>
      <tbody>${workers.map(w=>{const wr=rows.filter(r=>r.lavoratore===w),ws=calcSummary(wr);return`<tr><td><span class="worker-tag">👤 ${w}</span></td><td>${wr.length}</td><td>${sumPz(wr).toLocaleString('it')}</td><td>€ ${ws.imponibile.toFixed(2)}</td><td class="money-cell">€ ${(ws.imponibile+ws.iva).toFixed(2)}</td></tr>`;}).join('')}</tbody>
    </table></div>
  </div>`:''}
  <div class="card">
    <div class="card-hdr"><h3>Dettaglio lavori – ${month}</h3></div>
    <div class="filter-row no-print">
      <select id="tipo-filter" onchange="applyFilter()"><option value="">Tutti i tipi</option><option value="pasta">Pasta</option><option value="spezie">Spezie</option><option value="etichettatura">Etichettatura</option><option value="riso">Riso</option><option value="riso_prezzo">Riso+Prezzo</option>${customTypes.map(ct=>`<option value="altro_${ct.id}">${ct.label}</option>`).join('')}</select>
      <select id="worker-filter" onchange="applyFilter()"><option value="">Tutti i lavoratori</option>${workers.map(w=>`<option value="${w}">👤 ${w}</option>`).join('')}</select>
      <input type="text" id="search-input" placeholder="🔍 Cerca…" oninput="applyFilter()">
    </div>
    ${!rows.length?`<div class="empty"><div class="ei">📭</div><p>Nessun lavoro per ${month}</p></div>`:`
    <div id="detail-container">
      ${rows.map(r=>{
        const pr=PRICES[r.tipo]||0;
        return `<div class="detail-record" data-tipo="${r.tipo}" data-worker="${r.lavoratore||''}" data-q="${(r.descrizione+' '+r.ordine).toLowerCase()}">
          <div class="detail-record-top">
            <div class="detail-desc">${r.descrizione}</div>
            <span class="chip chip-${chipCls(r.tipo)}">${tLbl(r.tipo)}</span>
          </div>
          <div class="detail-meta">
            <div class="dm-item"><span class="dm-label">📅 Data</span><span class="dm-value">${r.data}</span></div>
            <div class="dm-item"><span class="dm-label">🔢 N° Ordine</span><span class="dm-value">${r.ordine||'—'}</span></div>
            <div class="dm-item"><span class="dm-label">📦 Pezzi</span><span class="dm-value" style="color:var(--rust);">${Number(r.pezzi).toLocaleString('it')}</span></div>
            <div class="dm-item"><span class="dm-label">📫 Cartoni</span><span class="dm-value">${r.cartoni||'—'}</span></div>
            <div class="dm-item"><span class="dm-label">€/cad.</span><span class="dm-value dm-price">€ ${pr.toFixed(3)}</span></div>
            <div class="dm-item"><span class="dm-label">💰 Importo</span><span class="dm-value dm-amount">€ ${(r.pezzi*pr).toFixed(2)}</span></div>
            ${r.note?`<div class="dm-item" style="grid-column:1/-1"><span class="dm-label">📝 Note</span><span class="dm-value" style="font-size:12px;">${r.note}</span></div>`:''}
          </div>
          <div class="detail-footer">
            <span class="worker-tag">👤 ${r.lavoratore||'—'}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

window.applyFilter=function(){
  const tipo=document.getElementById('tipo-filter')?.value||'';
  const worker=document.getElementById('worker-filter')?.value||'';
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  document.querySelectorAll('#detail-container .detail-record').forEach(r=>{
    const ok=(!tipo||r.dataset.tipo===tipo)&&(!worker||r.dataset.worker===worker)&&(!q||r.dataset.q.includes(q));
    r.style.display=ok?'':'none';
  });
};

function calcSummary(rows){
  const byTipo={};
  rows.forEach(r=>{if(!byTipo[r.tipo])byTipo[r.tipo]=0;byTipo[r.tipo]+=r.pezzi||0;});
  const lines=Object.entries(byTipo).map(([tipo,pezzi])=>({tipo,pezzi,prezzo:PRICES[tipo]||0,importo:pezzi*(PRICES[tipo]||0)}));
  const imponibile=lines.reduce((a,l)=>a+l.importo,0),iva=imponibile*0.22;
  return{lines,imponibile,iva};
}
function sumPz(rows){return rows.reduce((a,r)=>a+(r.pezzi||0),0);}
function chipCls(t){return{pasta:'pasta',spezie:'spezie',etichettatura:'etichettatura',riso:'riso',riso_prezzo:'riso_prezzo'}[t]||'altro';}
function tLbl(t){
  const m={pasta:'Pasta',spezie:'Spezie',etichettatura:'Etich.',riso:'Riso',riso_prezzo:'Riso+Prez'};
  if(m[t])return m[t];
  if(t&&t.startsWith('altro_')){const ct=customTypes.find(c=>c.id===t.replace('altro_',''));return ct?ct.label:'Altro';}
  return t||'Altro';
}
</script>
</body>
</html>
